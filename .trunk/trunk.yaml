---
version: 0.1
cli:
  version: 1.25.0
plugins:
  sources:
    - id: trunk
      ref: v1.7.6
      uri: https://github.com/trunk-io/plugins
runtimes:
  enabled:
    - go@1.21.0
    - node@22.16.0
    - python@3.10.8
lint:
  enabled:
    - checkov@3.2.508
    - git-diff-check
    - hadolint@2.14.0
    - markdownlint@0.48.0
    - prettier@3.8.1
    - shellcheck@0.11.0
    - shfmt@3.6.0
    - taplo@0.10.0
    - trufflehog@3.93.8
    - yamllint@1.38.0
  ignore:
    - linters: [markdownlint]
      paths:
        - designs/**
    - linters: [prettier]
      paths:
        - designs/**
actions:
  disabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
  enabled:
    - trunk-upgrade-available
