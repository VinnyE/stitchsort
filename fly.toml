app = "replace-with-your-app-name"
primary_region = "ord"

[build]
dockerfile = "Dockerfile"

[mounts]
source = "app_data"
destination = "/data"

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 1

[[http_service.checks]]
grace_period = "10s"
interval = "30s"
method = "GET"
path = "/api/health"
timeout = "5s"

[env]
DATABASE_URL = "/data/app.sqlite"
LITESTREAM_REPLICA_PATH = "app.sqlite"
PORT = "3000"
UPLOAD_DIR = "/data/uploads"

[[vm]]
memory = "1gb"
cpu_kind = "shared"
cpus = 1
